repository_type: pipeline

nf_core_version: 3.5.2

lint:
  files_unchanged:
    - CODE_OF_CONDUCT.md
    - assets/nf-core-divergence_logo_light.png
    - docs/images/nf-core-divergence_logo_light.png
    - docs/images/nf-core-divergence_logo_dark.png
    - .github/ISSUE_TEMPLATE/bug_report.yml
    - .github/CONTRIBUTING.md
    - .github/PULL_REQUEST_TEMPLATE.md
    - assets/email_template.txt
    - docs/README.md
    - .prettierignore
    - LICENSE
    - .github/CONTRIBUTING.md
    - assets/sendmail_template.txt
    - .prettierignore
  nextflow_config:
    - manifest.name
    - manifest.homePage
  multiqc_config: false
  files_exist:
    - conf/igenomes.config
    - conf/igenomes_ignored.config
    - CODE_OF_CONDUCT.md
    - assets/nf-core-divergence_logo_light.png
    - docs/images/nf-core-divergence_logo_light.png
    - docs/images/nf-core-divergence_logo_dark.png
    - .github/ISSUE_TEMPLATE/config.yml
    - .github/workflows/awstest.yml
    - .github/workflows/awsfulltest.yml
    - LICENSE
    - CHANGELOG.md
    - assets/multiqc_config.yml
  readme:
    - nextflow_badge
    - nfcore_template_badge

template:
  org: uml
  name: divergence
  description: A Nextflow pipeline for identifying putative paralogs and calculating
    their divergence
  author: Tom Wolfe
  version: 1.0.0dev
  force: true
  outdir: .
  skip_features:
    - github_badges
    - changelog
    - license
    - igenomes
    - multiqc
    - fastqc
    - seqera_platform
    - gpu
    - adaptivecard
    - slackreport
  is_nfcore: false
